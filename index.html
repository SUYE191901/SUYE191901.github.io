<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>예약 통합 관리자 대시보드</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for inline JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 스크롤바 커스텀 및 숨김 처리 (모바일 스와이프 고려) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- [SVG Icon Component (Lucide 대체용)] ---
    const Icon = ({ name, size = 24, className = "", onClick, style }) => {
      const paths = {
        LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
        CalendarCheck: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></>,
        Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
        Bell: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
        Search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
        MoreVertical: <><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></>,
        TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
        Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
        XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
        X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        PlayCircle: <><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></>,
        ChevronLeft: <><path d="m15 18-6-6 6-6"/></>,
        ChevronRight: <><path d="m9 18 6-6-6-6"/></>,
        Edit2: <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
        Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
        Menu: <><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>
      };
      return (
        <svg onClick={onClick} style={style} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name]}
        </svg>
      );
    };

    // --- [Mock Data] ---
    const LARGE_CATEGORIES = ['스튜디오', '포토그래퍼', '뷰티샵', '브랜드사'];

    const CATEGORY_MAP = {
      '스튜디오': ['스튜디오A', '빛나는스튜디오', '모던픽쳐스', '더프레임'],
      '포토그래퍼': ['김사진 작가', '이포토 작가', '박스냅', '최감성 스튜디오'],
      '뷰티샵': ['끌림 헤어메이크업', '살롱드뷰티', '에이치메이크업', '청담살롱'],
      '브랜드사': ['웨딩컴퍼니', '패션브랜드X', '코스메틱Y', '매거진Z']
    };

    const INITIAL_RESERVATIONS = [
      { id: '2026-000001', customer: '김철수', phone: '010-1234-5678', largeCat: '스튜디오', mediumCat: '빛나는스튜디오', item: 'A룸 4시간 대관', date: '2026-02-24', status: '대기', amount: 250000 },
      { id: '2026-000002', customer: '이영희', phone: '010-9876-5432', largeCat: '포토그래퍼', mediumCat: '김사진 작가', item: '야외 스냅 촬영', date: '2026-02-25', status: '확정', amount: 600000 },
      { id: '2026-000003', customer: '박지민', phone: '010-1111-2222', largeCat: '뷰티샵', mediumCat: '살롱드뷰티', item: '웨딩 헤어/메이크업', date: '2026-02-24', status: '진행', amount: 350000 },
      { id: '2026-000004', customer: '최동훈', phone: '010-3333-4444', largeCat: '브랜드사', mediumCat: '웨딩컴퍼니', item: 'B2B 제휴 상품 촬영', date: '2026-02-23', status: '완료', amount: 1200000 },
      { id: '2026-000005', customer: '정수아', phone: '010-5555-6666', largeCat: '스튜디오', mediumCat: '모던픽쳐스', item: '자연광 C룸 렌탈', date: '2026-02-28', status: '취소', amount: 150000 },
      { id: '2026-000006', customer: '강다니엘', phone: '010-7777-8888', largeCat: '포토그래퍼', mediumCat: '이포토 작가', item: '프로필 촬영', date: '2026-03-01', status: '대기', amount: 200000 },
    ];

    const INITIAL_PARTNERS = [
      { id: 'PTN-101', name: '빛나는스튜디오 본점', largeCat: '스튜디오', mediumCat: '빛나는스튜디오', contact: '02-123-4567', status: '활성' },
      { id: 'PTN-102', name: '김사진 대표', largeCat: '포토그래퍼', mediumCat: '김사진 작가', contact: '010-9999-8888', status: '활성' },
      { id: 'PTN-103', name: '살롱드뷰티 청담', largeCat: '뷰티샵', mediumCat: '살롱드뷰티', contact: '02-987-6543', status: '휴면' },
    ];

    const STATUS_COLORS = {
      '대기': 'bg-yellow-100 text-yellow-700 border-yellow-200',
      '확정': 'bg-blue-100 text-blue-700 border-blue-200',
      '진행': 'bg-purple-100 text-purple-700 border-purple-200',
      '완료': 'bg-green-100 text-green-700 border-green-200',
      '취소': 'bg-red-100 text-red-700 border-red-200'
    };

    // --- [Main Component] ---
    function AdminDashboard() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [reservations, setReservations] = useState(INITIAL_RESERVATIONS);
      const [partners, setPartners] = useState(INITIAL_PARTNERS);
      const [categoryMap, setCategoryMap] = useState(CATEGORY_MAP);

      // 대시보드 통계 카드 색상 상태 관리
      const [statColors, setStatColors] = useState({
        pending: '#eab308',   // yellow-500
        confirmed: '#3b82f6', // blue-500
        completed: '#22c55e', // green-500
        revenue: '#a855f7'    // purple-500
      });

      // Search, Modal & Sidebar State
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearchOpen, setIsSearchOpen] = useState(false);
      
      const [globalSelectedDate, setGlobalSelectedDate] = useState(null); // 날짜 클릭 시 일정 리스트 모달
      const [globalSelectedRes, setGlobalSelectedRes] = useState(null);   // 단일 일정 상세 모달
      const [globalIsEditMode, setGlobalIsEditMode] = useState(false);    // 상세 모달 내 수정 모드 상태
      const [globalEditForm, setGlobalEditForm] = useState(null);         // 상세 모달 수정 폼 데이터
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // 검색어 공백 제거 및 소문자 변환 후 통합 검색
      const searchLower = searchQuery.trim().toLowerCase();
      const searchResults = reservations.filter(res =>
        res.customer.toLowerCase().includes(searchLower) ||
        res.phone.includes(searchLower) ||
        res.id.toLowerCase().includes(searchLower) ||
        res.largeCat.toLowerCase().includes(searchLower) ||
        res.mediumCat.toLowerCase().includes(searchLower) ||
        res.item.toLowerCase().includes(searchLower)
      );

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsSidebarOpen(false); // 모바일에서 탭 이동 시 사이드바 닫기
      };

      const closeGlobalResModal = () => {
        setGlobalSelectedRes(null);
        setGlobalIsEditMode(false);
        setGlobalEditForm(null);
      };

      return (
        <div className="flex h-[100dvh] bg-slate-50 font-sans text-slate-800 overflow-hidden">
          
          {/* Mobile Sidebar Overlay */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-slate-900/50 z-40 md:hidden"
              onClick={() => setIsSidebarOpen(false)}
            />
          )}

          {/* Sidebar */}
          <aside className={`
            fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 ease-in-out
            md:relative md:translate-x-0
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}
          `}>
            <div className="p-6 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold text-white tracking-wider">RESERVE<span className="text-blue-500">PRO</span></h1>
                <p className="text-xs text-slate-500 mt-1">통합 예약 관리 시스템</p>
              </div>
              <button className="md:hidden text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                <Icon name="X" size={24} />
              </button>
            </div>
            
            <nav className="flex-1 px-4 space-y-2 mt-2 overflow-y-auto">
              <NavItem icon={<Icon name="LayoutDashboard" size={20} />} label="대시보드" isActive={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
              <NavItem icon={<Icon name="CalendarCheck" size={20} />} label="예약 관리" isActive={activeTab === 'reservations'} onClick={() => handleTabChange('reservations')} />
              <NavItem icon={<Icon name="Users" size={20} />} label="파트너/카테고리" isActive={activeTab === 'partners'} onClick={() => handleTabChange('partners')} />
              <NavItem icon={<Icon name="Settings" size={20} />} label="시스템 설정" isActive={activeTab === 'settings'} onClick={() => handleTabChange('settings')} />
            </nav>

            <div className="p-4 border-t border-slate-700/50 mt-auto">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold shrink-0">A</div>
                <div className="truncate">
                  <p className="text-sm font-medium text-white truncate">최고 관리자</p>
                  <p className="text-xs text-slate-400 truncate">admin@reservepro.com</p>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col w-full min-w-0 overflow-hidden">
            {/* Header */}
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shrink-0">
              <div className="flex items-center gap-3">
                <button 
                  className="p-1 -ml-1 text-slate-500 hover:bg-slate-100 rounded-md md:hidden"
                  onClick={() => setIsSidebarOpen(true)}
                >
                  <Icon name="Menu" size={24} />
                </button>
                <h2 className="text-lg md:text-xl font-bold text-slate-800 truncate">
                  {activeTab === 'dashboard' && '통합 대시보드'}
                  {activeTab === 'reservations' && '예약 상태 관리'}
                  {activeTab === 'partners' && '파트너/카테고리'}
                  {activeTab === 'settings' && '시스템 설정'}
                </h2>
              </div>

              <div className="flex items-center gap-2 md:gap-4">
                <div className="relative">
                  <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                  <input 
                    type="text" 
                    value={searchQuery}
                    onChange={(e) => {
                      setSearchQuery(e.target.value);
                      setIsSearchOpen(true);
                    }}
                    onFocus={() => setIsSearchOpen(true)}
                    onBlur={() => setTimeout(() => setIsSearchOpen(false), 200)} 
                    placeholder="고객명, 예약번호, 카테고리, 상품명 검색..." 
                    className="pl-9 pr-3 py-1.5 md:py-2 bg-slate-100 border-transparent rounded-lg text-xs md:text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all w-36 sm:w-64 md:w-80"
                  />
                  
                  {/* Search Dropdown */}
                  {isSearchOpen && searchQuery && (
                    <div className="absolute top-full mt-2 right-0 w-[calc(100vw-2rem)] sm:w-80 max-w-sm bg-white border border-slate-200 shadow-xl rounded-xl z-50 overflow-hidden">
                      <div className="p-3 bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500">
                        검색 결과 ({searchResults.length}건)
                      </div>
                      <div className="max-h-64 overflow-y-auto">
                        {searchResults.length > 0 ? (
                          searchResults.map(res => (
                            <div
                              key={res.id}
                              onClick={() => {
                                setGlobalSelectedRes(res);
                                setGlobalIsEditMode(false);
                                setIsSearchOpen(false);
                                setSearchQuery('');
                              }}
                              className="p-3 border-b border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors"
                            >
                              <div className="flex justify-between items-center mb-1">
                                <span className="text-sm font-bold text-slate-800">{res.customer}</span>
                                <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold border ${STATUS_COLORS[res.status]}`}>{res.status}</span>
                              </div>
                              <p className="text-xs text-slate-500">{res.id} | {res.phone}</p>
                              <p className="text-xs text-slate-600 mt-1 truncate">{res.largeCat} &gt; {res.mediumCat} : {res.item}</p>
                            </div>
                          ))
                        ) : (
                          <div className="p-4 text-center text-sm text-slate-500">
                            검색 결과가 없습니다.
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
                <button className="relative p-1.5 md:p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors">
                  <Icon name="Bell" size={20} />
                  <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
              </div>
            </header>

            {/* Scrollable Content Area */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              {activeTab === 'dashboard' && <DashboardView reservations={reservations} onSelectReservation={setGlobalSelectedRes} onSelectDate={setGlobalSelectedDate} statColors={statColors} />}
              {activeTab === 'reservations' && <ReservationsView reservations={reservations} setReservations={setReservations} categoryMap={categoryMap} />}
              {activeTab === 'partners' && <PartnersView partners={partners} setPartners={setPartners} categoryMap={categoryMap} setCategoryMap={setCategoryMap} setReservations={setReservations} />}
              {activeTab === 'settings' && <SettingsView statColors={statColors} setStatColors={setStatColors} />}
            </div>
          </main>

          {/* Global Date Summary Modal (해당 날짜 전체 일정 리스트) */}
          {globalSelectedDate && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90dvh] flex flex-col animate-in fade-in zoom-in duration-200">
                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl shrink-0">
                  <div>
                    <h3 className="font-bold text-lg">{globalSelectedDate.date} 예약 일정</h3>
                    <p className="text-xs text-slate-500 mt-1">총 {reservations.filter(r => r.date === globalSelectedDate.date).length}건의 예약이 있습니다.</p>
                  </div>
                  <button onClick={() => setGlobalSelectedDate(null)} className="text-slate-400 hover:text-slate-700">
                    <Icon name="XCircle" size={24} />
                  </button>
                </div>
                
                <div className="p-4 overflow-y-auto flex-1 bg-slate-50/50">
                  <div className="space-y-3">
                    {reservations.filter(r => r.date === globalSelectedDate.date).map(res => (
                      <div 
                        key={res.id}
                        onClick={() => {
                          setGlobalSelectedRes(res);
                          setGlobalIsEditMode(false);
                        }} 
                        className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm hover:border-blue-400 hover:shadow-md cursor-pointer transition-all"
                      >
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <span className="font-bold text-slate-800 text-sm">{res.customer}</span>
                            <span className="text-xs text-slate-500 ml-1">({res.phone})</span>
                          </div>
                          <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold border ${STATUS_COLORS[res.status]}`}>{res.status}</span>
                        </div>
                        <div className="text-xs text-slate-500 mb-1">{res.largeCat} &gt; {res.mediumCat}</div>
                        <div className="text-sm font-medium text-slate-800 truncate">{res.item}</div>
                      </div>
                    ))}
                  </div>
                </div>
                
                <div className="px-5 py-3 border-t border-slate-100 bg-white rounded-b-xl shrink-0 flex justify-end">
                  <button 
                    onClick={() => setGlobalSelectedDate(null)} 
                    className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                  >
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Global Reservation Detail Modal (단일 일정 상세 보기) */}
          {globalSelectedRes && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[70] p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90dvh] overflow-y-auto animate-in fade-in zoom-in duration-200">
                <div className="sticky top-0 px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 z-10">
                  <h3 className="font-bold text-lg">{globalIsEditMode ? '예약 내역 수정' : '예약 상세 정보'}</h3>
                  <button onClick={closeGlobalResModal} className="text-slate-400 hover:text-slate-700">
                    <Icon name="XCircle" size={24} />
                  </button>
                </div>
                
                <div className="p-5 space-y-4">
                  {globalIsEditMode ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div className="sm:col-span-2 flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                        <span className="text-xs md:text-sm font-medium text-slate-500">예약번호: {globalEditForm.id}</span>
                      </div>
                      <div>

    function DashboardView({ reservations, onSelectReservation, onSelectDate, statColors }) {
      const [currentDate, setCurrentDate] = useState(new Date(2026, 1, 1)); 

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const currentMonthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
      const currentMonthReservations = reservations.filter(r => r.date.startsWith(currentMonthPrefix));

      const stats = {
        total: currentMonthReservations.length,
        pending: currentMonthReservations.filter(r => r.status === '대기').length,
        confirmed: currentMonthReservations.filter(r => r.status === '확정' || r.status === '진행').length,
        completed: currentMonthReservations.filter(r => r.status === '완료').length,
        revenue: currentMonthReservations.filter(r => r.status !== '취소').reduce((acc, curr) => acc + curr.amount, 0)
      };

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      const days = [];
      for (let i = 0; i < firstDay; i++) { days.push(null); }
      for (let i = 1; i <= daysInMonth; i++) { days.push(i); }

      const renderDayCell = (day, index) => {
        if (!day) return <div key={`empty-${index}`} className="bg-slate-50/80 border border-slate-100 p-1 md:p-2 min-h-[80px] md:min-h-[120px]"></div>;
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayReservations = reservations.filter(r => r.date === dateStr);
        
        return (
          <div 
            key={day} 
            onClick={() => {
              if (dayReservations.length > 0) {
                onSelectDate({ date: dateStr, reservations: dayReservations });
              }
            }}
            className="bg-white border border-slate-100 p-1 md:p-2 min-h-[80px] md:min-h-[120px] flex flex-col hover:bg-slate-50 transition-colors group cursor-pointer overflow-hidden"
          >
            <div className="flex justify-between items-center mb-1">
              <span className={`text-xs md:text-sm font-medium ${
                (index % 7 === 0) ? 'text-red-500' : (index % 7 === 6) ? 'text-blue-500' : 'text-slate-700'
              }`}>{day}</span>
              {dayReservations.length > 0 && (
                <span className="text-[9px] md:text-[10px] bg-slate-100 text-slate-500 px-1 md:px-1.5 rounded-full font-medium">{dayReservations.length}건</span>
              )}
            </div>
            <div className="flex-1 space-y-1 overflow-y-auto scrollbar-hide">
              {dayReservations.map(res => (
                <div 
                  key={res.id} 
                  onClick={(e) => {
                    e.stopPropagation();
                    onSelectReservation(res);
                  }}
                  className={`text-[9px] md:text-[11px] leading-tight px-1.5 py-1 rounded border ${STATUS_COLORS[res.status]} flex flex-col shadow-sm cursor-pointer hover:opacity-80 transition-opacity`}
                >
                  <span className="font-bold truncate">{res.mediumCat}, {res.customer}</span>
                  <span className="truncate text-[8px] md:text-[10px] opacity-80 mt-0.5">₩{res.amount.toLocaleString()}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-4 md:space-y-6 h-full flex flex-col">
          {/* Stat Cards */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6 shrink-0">
            <StatCard title="대기" value={stats.pending} icon={<Icon name="Clock" size={18} style={{ color: statColors.pending }} />} trend="+12%" />
            <StatCard title="진행/확정" value={stats.confirmed} icon={<Icon name="PlayCircle" size={18} style={{ color: statColors.confirmed }} />} trend="+5%" />
            <StatCard title="완료" value={stats.completed} icon={<Icon name="CheckCircle2" size={18} style={{ color: statColors.completed }} />} trend="-2%" />
            <StatCard title="매출액" value={`₩${stats.revenue.toLocaleString()}`} icon={<Icon name="TrendingUp" size={18} style={{ color: statColors.revenue }} />} trend="+18%" />
          </div>

          {/* Calendar Area */}
          <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col flex-1 min-h-[400px]">
            <div className="p-3 md:p-4 border-b border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3 bg-slate-50/50">
              <h3 className="text-base md:text-lg font-bold text-slate-800">월간 예약 캘린더</h3>
              <div className="flex items-center gap-2 md:gap-4 bg-white border border-slate-200 rounded-lg p-1 shadow-sm w-full sm:w-auto justify-between sm:justify-center">
                <button onClick={prevMonth} className="p-1 md:p-1.5 hover:bg-slate-100 rounded-md text-slate-600 transition-colors">
                  <Icon name="ChevronLeft" size={20} />
                </button>
                <span className="text-sm font-bold w-24 text-center text-slate-800">
                  {year}년 {month + 1}월
                </span>
                <button onClick={nextMonth} className="p-1 md:p-1.5 hover:bg-slate-100 rounded-md text-slate-600 transition-colors">
                  <Icon name="ChevronRight" size={20} />
                </button>
              </div>
            </div>

            <div className="p-2 md:p-4 bg-slate-50/30 flex-1 flex flex-col overflow-auto">
              <div className="min-w-[500px] h-full flex flex-col">
                <div className="grid grid-cols-7 mb-2 shrink-0">
                  {['일', '월', '화', '수', '목', '금', '토'].map((day, idx) => (
                    <div key={day} className={`text-center text-xs font-bold ${idx === 0 ? 'text-red-500' : idx === 6 ? 'text-blue-500' : 'text-slate-500'}`}>
                      {day}
                    </div>
                  ))}
                </div>
                <div className="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-lg overflow-hidden flex-1 min-h-[400px] md:min-h-[500px]">
                  {days.map((day, index) => renderDayCell(day, index))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

                        value={editingRes.mediumCat}
                        onChange={(e) => setEditingRes({...editingRes, mediumCat: e.target.value})}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        {(categoryMap[editingRes.largeCat] || []).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                        {/* 카테고리 이름이 삭제되거나 안맞을때의 fallback */}
                        {!categoryMap[editingRes.largeCat]?.includes(editingRes.mediumCat) && (
                          <option value={editingRes.mediumCat}>{editingRes.mediumCat}</option>
                        )}
                      </select>
                    </div>

                    <div className="sm:col-span-2">
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">예약상품</label>
                      <input 
                        type="text" 
                        value={editingRes.item}
                        onChange={(e) => setEditingRes({...editingRes, item: e.target.value})}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                      />
                    </div>

                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">예약일자</label>
                      <input 
                        type="date" 
                        value={editingRes.date}
                        onChange={(e) => setEditingRes({...editingRes, date: e.target.value})}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                      />
                    </div>
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">결제금액 (₩)</label>
                      <input 
                        type="number" 
                        value={editingRes.amount}
                        onChange={(e) => setEditingRes({...editingRes, amount: parseInt(e.target.value) || 0})}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                      />
                    </div>
                    
                    <div className="sm:col-span-2">
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">예약 상태</label>
                      <select 
                        value={editingRes.status}
                        onChange={(e) => setEditingRes({...editingRes, status: e.target.value})}
                        className={`w-full border rounded-lg px-3 py-2 text-xs md:text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500 ${STATUS_COLORS[editingRes.status]}`}
                      >
                        <option value="대기">대기</option>
                        <option value="확정">확정</option>
                        <option value="진행">진행</option>
                        <option value="완료">완료</option>
                        <option value="취소">취소</option>
                      </select>
                    </div>
                  </div>
                </div>
                
                <div className="sticky bottom-0 px-5 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                  <button 
                    onClick={() => setEditingRes(null)} 
                    className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition-colors w-full sm:w-auto"
                  >
                    취소
                  </button>
                  <button 
                    onClick={() => {
                      setReservations(prev => prev.map(r => r.id === editingRes.id ? editingRes : r));
                      setEditingRes(null);
                    }} 
                    className="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors w-full sm:w-auto"
                  >
                    저장 완료
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PartnersView({ partners, setPartners, categoryMap, setCategoryMap, setReservations }) {
      const [selectedLargeCat, setSelectedLargeCat] = useState('스튜디오');
      const [selectedMediumCat, setSelectedMediumCat] = useState('전체');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingCat, setEditingCat] = useState({ oldName: '', newName: '' });

      // 중분류 추가 및 삭제용 상태
      const [isAddingCat, setIsAddingCat] = useState(false);
      const [newCatName, setNewCatName] = useState('');
      const [deletingCat, setDeletingCat] = useState(null);

      // 파트너 수정용 상태
      const [editingPartner, setEditingPartner] = useState(null);

      const mediumCategories = categoryMap[selectedLargeCat];

      const handleEditCategory = (oldName, newName) => {
        if (!newName.trim() || oldName === newName) {
          setEditingCat({ oldName: '', newName: '' });
          return;
        }
        // 카테고리 맵 업데이트
        setCategoryMap(prev => ({
          ...prev,
          [selectedLargeCat]: prev[selectedLargeCat].map(cat => cat === oldName ? newName : cat)
        }));
        
        // 해당 카테고리에 속한 파트너들 업데이트
        setPartners(prev => prev.map(p => 
          (p.mediumCat === oldName && p.largeCat === selectedLargeCat) ? { ...p, mediumCat: newName } : p
        ));
        
        // 해당 카테고리에 속한 예약 내역들도 동기화 업데이트!
        setReservations(prev => prev.map(r => 
          (r.mediumCat === oldName && r.largeCat === selectedLargeCat) ? { ...r, mediumCat: newName } : r
        ));

        if (selectedMediumCat === oldName) setSelectedMediumCat(newName);
        setEditingCat({ oldName: '', newName: '' });
      };

      const handleAddCategory = () => {
        if (!newCatName.trim() || mediumCategories.includes(newCatName.trim())) {
          setIsAddingCat(false);
          setNewCatName('');
          return;
        }
        setCategoryMap(prev => ({
          ...prev,
          [selectedLargeCat]: [...prev[selectedLargeCat], newCatName.trim()]
        }));
        setIsAddingCat(false);
        setNewCatName('');
      };

      const handleDeleteCategory = (catToDelete) => {
        // 1. 카테고리 삭제
        setCategoryMap(prev => ({
          ...prev,
          [selectedLargeCat]: prev[selectedLargeCat].filter(c => c !== catToDelete)
        }));
        
        // 2. 삭제된 카테고리에 소속된 파트너를 '미지정' 처리
        setPartners(prev => prev.map(p => 
          (p.mediumCat === catToDelete && p.largeCat === selectedLargeCat) ? { ...p, mediumCat: '미지정' } : p
        ));
        
        // 3. 연관된 예약 데이터도 '미지정' 처리하여 오류 방지 및 연동
        setReservations(prev => prev.map(r => 
          (r.mediumCat === catToDelete && r.largeCat === selectedLargeCat) ? { ...r, mediumCat: '미지정' } : r
        ));

        if (selectedMediumCat === catToDelete) {
          setSelectedMediumCat('전체');
        }
        setDeletingCat(null);
      };

      const handleLargeCatChange = (cat) => {
        setSelectedLargeCat(cat);
        setSelectedMediumCat('전체');
        setIsAddingCat(false);
        setNewCatName('');
      };

      const filteredPartners = partners.filter(p => {
        if (p.largeCat !== selectedLargeCat) return false;
        if (selectedMediumCat !== '전체' && p.mediumCat !== selectedMediumCat) return false;
        return true;
      });

      return (
        <div className="flex flex-col h-full space-y-4 md:space-y-6">
          {/* Category Tabs */}
          <div className="flex border-b border-slate-200 overflow-x-auto scrollbar-hide">
            {LARGE_CATEGORIES.map(cat => (
              <button
                key={cat}
                onClick={() => handleLargeCatChange(cat)}
                className={`whitespace-nowrap px-4 md:px-8 py-2 md:py-3 font-medium text-xs md:text-sm transition-colors border-b-2 ${
                  selectedLargeCat === cat 
                    ? 'border-blue-600 text-blue-600' 
                    : 'border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300'
                }`}
              >
                {cat}
              </button>
            ))}
          </div>

          {/* Main Content Area */}
          <div className="flex flex-col lg:flex-row gap-4 md:gap-6 flex-1 min-h-0">
            {/* Sidebar for Medium Categories */}
            <div className="w-full lg:w-64 shrink-0 bg-white rounded-xl border border-slate-200 shadow-sm p-3 md:p-4 flex flex-col h-48 lg:h-auto">
              <h3 className="text-xs md:text-sm font-bold text-slate-800 mb-2 md:mb-4 px-2">담당자(중분류) 필터</h3>
              <div className="space-y-1 overflow-y-auto flex-1 pr-1">
                <button
                  onClick={() => setSelectedMediumCat('전체')}
                  className={`w-full text-left px-3 py-1.5 md:py-2 text-xs md:text-sm rounded-lg transition-colors ${
                    selectedMediumCat === '전체' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  전체 보기
                </button>
                {mediumCategories.map(mCat => (
                  <div key={mCat} className="relative group">
                    {editingCat.oldName === mCat ? (
                      <div className="flex items-center gap-2 px-2 py-1 bg-slate-50 rounded-lg">
                        <input 
                          type="text" 
                          value={editingCat.newName}
                          onChange={(e) => setEditingCat({...editingCat, newName: e.target.value})}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') handleEditCategory(mCat, editingCat.newName);
                            if (e.key === 'Escape') setEditingCat({ oldName: '', newName: '' });
                          }}
                          className="w-full border border-blue-300 rounded px-1.5 py-0.5 text-xs outline-none focus:ring-2 focus:ring-blue-500"
                        />
                        <button onClick={() => handleEditCategory(mCat, editingCat.newName)} className="text-blue-600 text-[10px] font-bold shrink-0">저장</button>
                      </div>
                    ) : (
                      <button
                        onClick={() => setSelectedMediumCat(mCat)}
                        className={`w-full text-left px-3 py-1.5 md:py-2 text-xs md:text-sm rounded-lg transition-colors flex justify-between items-center ${
                          selectedMediumCat === mCat ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'
                        }`}
                      >
                        <span className="truncate pr-2 text-left flex-1">{mCat}</span>
                        <div className="flex items-center gap-1 shrink-0">
                          <div 
                            onClick={(e) => { e.stopPropagation(); setEditingCat({ oldName: mCat, newName: mCat }); }}
                            className="lg:opacity-0 lg:group-hover:opacity-100 text-slate-400 hover:text-blue-600 transition-opacity p-1 rounded hover:bg-slate-200 cursor-pointer flex items-center justify-center"
                            title="이름 수정"
                          >
                            <Icon name="Edit2" size={12} />
                          </div>
                          <div 
                            onClick={(e) => { e.stopPropagation(); setDeletingCat(mCat); }}
                            className="lg:opacity-0 lg:group-hover:opacity-100 text-slate-400 hover:text-red-600 transition-opacity p-1 rounded hover:bg-slate-200 cursor-pointer flex items-center justify-center"
                            title="삭제"
                          >
                            <Icon name="Trash2" size={12} />
                          </div>
                          <span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded-full text-slate-500">
                            {partners.filter(p => p.largeCat === selectedLargeCat && p.mediumCat === mCat).length}
                          </span>
                        </div>
                      </button>
                    )}
                  </div>
                ))}
              </div>
              <div className="mt-2 md:mt-auto pt-2 md:pt-4 border-t border-slate-100">
                {isAddingCat ? (
                  <div className="flex items-center gap-2 px-2 py-1.5 bg-slate-50 rounded-lg border border-blue-200">
                    <input 
                      type="text" 
                      value={newCatName}
                      onChange={(e) => setNewCatName(e.target.value)}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') handleAddCategory();
                        if (e.key === 'Escape') { setIsAddingCat(false); setNewCatName(''); }
                      }}
                      autoFocus
                      placeholder="새 담당자 입력..."
                      className="w-full bg-transparent px-1.5 py-0.5 text-xs outline-none"
                    />
                    <button onClick={handleAddCategory} className="text-blue-600 text-xs font-bold shrink-0 hover:text-blue-700">추가</button>
                  </div>
                ) : (
                  <button onClick={() => setIsAddingCat(true)} className="w-full py-1.5 md:py-2 text-xs md:text-sm text-slate-500 border border-dashed border-slate-300 rounded-lg hover:border-blue-400 hover:text-blue-600 transition-colors flex items-center justify-center gap-1">
                    <Icon name="Plus" size={14} /> 담당자(중분류) 추가
                  </button>
                )}
              </div>
            </div>

            {/* Partner List */}
            <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">
              <div className="p-3 md:p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                <h3 className="font-semibold text-slate-800 text-sm md:text-base truncate mr-2">
                  <span className="hidden sm:inline">{selectedLargeCat} </span>
                  {selectedMediumCat !== '전체' ? `> ${selectedMediumCat}` : '전체 파트너'}
                </h3>
                <button 
                  onClick={() => setIsModalOpen(true)}
                  className="bg-blue-600 hover:bg-blue-700 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium transition-colors flex items-center gap-1.5 whitespace-nowrap"
                >
                  <Icon name="Plus" size={14} /> <span className="hidden sm:inline">신규 파트너 </span>등록
                </button>
              </div>

              <div className="overflow-x-auto p-0 flex-1">
                <table className="w-full min-w-[600px] text-left text-sm whitespace-nowrap">
                  <thead className="bg-slate-50 text-slate-600 border-b border-slate-200 sticky top-0 z-10">
                    <tr>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium">파트너 ID</th>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium">지점</th>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium">담당자 (중분류)</th>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium">연락처</th>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium">상태</th>
                      <th className="px-4 md:px-6 py-3 md:py-4 font-medium text-center">관리</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {filteredPartners.map((ptn) => (
                      <tr key={ptn.id} className="hover:bg-slate-50/50 transition-colors">
                        <td className="px-4 md:px-6 py-3 md:py-4 font-medium text-slate-500 text-xs md:text-sm">{ptn.id}</td>
                        <td className="px-4 md:px-6 py-3 md:py-4 font-bold text-slate-900">{ptn.name}</td>
                        <td className="px-4 md:px-6 py-3 md:py-4 text-slate-600 text-xs md:text-sm">{ptn.mediumCat}</td>
                        <td className="px-4 md:px-6 py-3 md:py-4 text-slate-600 text-xs md:text-sm">{ptn.contact}</td>
                        <td className="px-4 md:px-6 py-3 md:py-4">
                          <span className={`px-2 py-1 rounded-full text-[10px] md:text-xs font-medium border ${
                            ptn.status === '활성' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-slate-100 text-slate-600 border-slate-200'
                          }`}>
                            {ptn.status}
                          </span>
                        </td>
                        <td className="px-4 md:px-6 py-3 md:py-4 text-center">
                          <button 
                            onClick={() => setEditingPartner({ ...ptn })}
                            className="text-slate-400 hover:text-blue-600 transition-colors p-1 rounded hover:bg-slate-100"
                            title="수정"
                          >
                            <Icon name="Edit2" size={16} />
                          </button>
                        </td>
                      </tr>
                    ))}
                    {filteredPartners.length === 0 && (
                      <tr>
                        <td colSpan="6" className="px-6 py-16 text-center text-slate-500">
                          <div className="flex flex-col items-center justify-center">
                            <Icon name="Users" size={32} className="text-slate-300 mb-3" />
                            <p className="text-sm">등록된 파트너가 없습니다.</p>
                          </div>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* New Partner Modal */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90dvh] overflow-y-auto animate-in fade-in zoom-in duration-200">
                <div className="sticky top-0 px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 z-10">
                  <h3 className="font-bold text-lg">신규 파트너 등록</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-700">
                    <Icon name="XCircle" size={24} />
                  </button>
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">지점명</label>
                    <input type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="지점명을 입력하세요" />
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">대카테고리</label>
                      <select className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm outline-none bg-slate-50" disabled>
                        <option>{selectedLargeCat}</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">담당자 (중분류)</label>
                      <select className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        {mediumCategories.map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">연락처</label>
                    <input type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="000-0000-0000" />
                  </div>
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">이메일</label>
                    <input type="email" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="example@email.com" />
                  </div>
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">주소</label>
                    <input type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="상세 주소를 입력하세요" />
                  </div>
                </div>
                <div className="sticky bottom-0 px-5 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                  <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-xs md:text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">
                    취소
                  </button>
                  <button 
                    onClick={() => { alert('등록되었습니다.'); setIsModalOpen(false); }} 
                    className="px-4 py-2 text-xs md:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors"
                  >
                    등록 완료
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Edit Partner Modal */}
          {editingPartner && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90dvh] overflow-y-auto animate-in fade-in zoom-in duration-200">
                <div className="sticky top-0 px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 z-10">
                  <h3 className="font-bold text-lg">파트너 정보 수정</h3>
                  <button onClick={() => setEditingPartner(null)} className="text-slate-400 hover:text-slate-700">
                    <Icon name="XCircle" size={24} />
                  </button>
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">지점명</label>
                    <input 
                      type="text" 
                      value={editingPartner.name}
                      onChange={(e) => setEditingPartner({...editingPartner, name: e.target.value})}
                      className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                    />
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">대카테고리</label>
                      <select 
                        value={editingPartner.largeCat}
                        onChange={(e) => {
                          const newLargeCat = e.target.value;
                          setEditingPartner({
                            ...editingPartner, 
                            largeCat: newLargeCat,
                            mediumCat: categoryMap[newLargeCat][0] || ''
                          });
                        }}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        {LARGE_CATEGORIES.map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">담당자 (중분류)</label>
                      <select 
                        value={editingPartner.mediumCat}
                        onChange={(e) => setEditingPartner({...editingPartner, mediumCat: e.target.value})}
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        {(categoryMap[editingPartner.largeCat] || []).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">연락처</label>
                    <input 
                      type="text" 
                      value={editingPartner.contact || ''}
                      onChange={(e) => setEditingPartner({...editingPartner, contact: e.target.value})}
                      className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs md:text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">상태</label>
                      <select 
                        value={editingPartner.status}
                        onChange={(e) => setEditingPartner({...editingPartner, status: e.target.value})}
                        className={`w-full border rounded-lg px-3 py-2 text-xs md:text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500 ${
                          editingPartner.status === '활성' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-slate-100 text-slate-600 border-slate-200'
                        }`}
                      >
                        <option value="활성">활성</option>
                        <option value="휴면">휴면</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div className="sticky bottom-0 px-5 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                  <button onClick={() => setEditingPartner(null)} className="px-4 py-2 text-xs md:text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">
                    취소
                  </button>
                  <button 
                    onClick={() => {
                      setPartners(prev => prev.map(p => p.id === editingPartner.id ? editingPartner : p));
                      setEditingPartner(null);
                    }} 
                    className="px-4 py-2 text-xs md:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors"
                  >
                    저장 완료
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Delete Category Confirm Modal */}
          {deletingCat && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[70] p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-6 text-center">
                  <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4">
                    <Icon name="Trash2" size={24} />
                  </div>
                  <h3 className="font-bold text-lg text-slate-800 mb-2">카테고리 삭제</h3>
                  <p className="text-sm text-slate-500 mb-6">
                    정말로 <strong className="text-slate-800">{deletingCat}</strong> 카테고리를 삭제하시겠습니까?<br/>
                  </p>
                  <div className="flex gap-2 w-full">
                    <button onClick={() => setDeletingCat(null)} className="flex-1 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">취소</button>
                    <button onClick={() => handleDeleteCategory(deletingCat)} className="flex-1 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">삭제</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SettingsView({ statColors, setStatColors }) {
      // 시스템 설정 내에서만 사용하는 임시 색상 상태
      const [localColors, setLocalColors] = useState(statColors);

      const handleColorChange = (key, value) => {
        setLocalColors(prev => ({ ...prev, [key]: value }));
      };

      // 적용 버튼 클릭 시 메인 대시보드 상태로 업데이트
      const handleApply = () => {
        setStatColors(localColors);
        const btn = document.getElementById('applyBtn');
        if(btn) {
          const originalText = btn.innerText;
          btn.innerText = '적용 완료!';
          btn.classList.add('bg-green-600');
          setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('bg-green-600');
          }, 1500);
        }
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 md:p-6 h-full overflow-y-auto flex flex-col">
          <h3 className="text-lg font-bold text-slate-800 mb-6 shrink-0">시스템 설정</h3>
          
          <div className="max-w-2xl flex-1">
            <h4 className="font-semibold text-slate-700 mb-2 border-b pb-2">대시보드 통계 카드 색상 설정</h4>
            <p className="text-xs text-slate-500 mb-6">아래의 컬러 피커를 클릭하여 색상을 지정한 후, <strong>[변경사항 적용]</strong> 버튼을 누르면 대시보드에 반영됩니다.</p>
            
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
              <div className="flex items-center justify-between p-4 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-white rounded shadow-sm">
                    <Icon name="Clock" size={20} style={{ color: localColors.pending }} />
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-800">대기</p>
                  </div>
                </div>
                <input 
                  type="color" 
                  value={localColors.pending}
                  onChange={(e) => handleColorChange('pending', e.target.value)}
                  className="w-10 h-10 rounded cursor-pointer border-0 p-0 bg-transparent"
                />
              </div>

              <div className="flex items-center justify-between p-4 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-white rounded shadow-sm">
                    <Icon name="PlayCircle" size={20} style={{ color: localColors.confirmed }} />
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-800">진행/확정</p>
                  </div>
                </div>
                <input 
                  type="color" 
                  value={localColors.confirmed}
                  onChange={(e) => handleColorChange('confirmed', e.target.value)}
                  className="w-10 h-10 rounded cursor-pointer border-0 p-0 bg-transparent"
                />
              </div>

              <div className="flex items-center justify-between p-4 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-white rounded shadow-sm">
                    <Icon name="CheckCircle2" size={20} style={{ color: localColors.completed }} />
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-800">완료</p>
                  </div>
                </div>
                <input 
                  type="color" 
                  value={localColors.completed}
                  onChange={(e) => handleColorChange('completed', e.target.value)}
                  className="w-10 h-10 rounded cursor-pointer border-0 p-0 bg-transparent"
                />
              </div>

              <div className="flex items-center justify-between p-4 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-white rounded shadow-sm">
                    <Icon name="TrendingUp" size={20} style={{ color: localColors.revenue }} />
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-800">매출액</p>
                  </div>
                </div>
                <input 
                  type="color" 
                  value={localColors.revenue}
                  onChange={(e) => handleColorChange('revenue', e.target.value)}
                  className="w-10 h-10 rounded cursor-pointer border-0 p-0 bg-transparent"
                />
              </div>
            </div>
          </div>

          <div className="mt-6 pt-4 border-t border-slate-100 flex justify-end shrink-0">
            <button 
              id="applyBtn"
              onClick={handleApply}
              className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg shadow-sm transition-colors w-full sm:w-auto"
            >
              변경사항 적용
            </button>
          </div>
        </div>
      );
    }

    // --- [UI Helpers] ---
    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-3 py-3 md:py-2.5 rounded-lg transition-colors text-sm font-medium ${
            isActive ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
          }`}
        >
          {icon}
          {label}
        </button>
      );
    }

    function StatCard({ title, value, icon, trend }) {
      const isPositive = trend.startsWith('+');
      return (
        <div className="bg-white p-3 md:p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between">
          <div className="flex justify-between items-start mb-2 md:mb-4">
            <div className="p-1.5 md:p-2 bg-slate-50 rounded-lg border border-slate-100">
              {icon}
            </div>
            <span className={`text-[10px] md:text-xs font-bold px-1.5 py-0.5 md:py-1 rounded-full ${
              isPositive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
            }`}>
              {trend}
            </span>
          </div>
          <div>
            <h4 className="text-slate-500 text-[10px] md:text-sm font-medium mb-0.5 md:mb-1">{title}</h4>
            <div className="text-base md:text-2xl font-bold text-slate-800 truncate">{value}</div>
          </div>
        </div>
      );
    }

    // --- [Mount] ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminDashboard />);
  </script>
</body>
</html>
